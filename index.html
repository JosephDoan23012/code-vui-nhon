<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Beat Ultra Smooth</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
        }

        canvas {
            position: fixed;
            inset: 0;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const settings = {
    beatDuration: 0.8,
    density: 1500,
    glow: 1.5
};

function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;

    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function heart(t, scale) {
    const x = 16 * Math.pow(Math.sin(t), 3);

    const y =
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t);

    return {
        x: x * scale,
        y: -y * scale
    };
}

class Particle {
    constructor() {
        this.init();
    }

    init() {
        const t = Math.random() * Math.PI * 2;
        const p = heart(t, 12 + Math.random() * 5);

        const fill = Math.sqrt(Math.random());

        this.ox = p.x * fill;
        this.oy = p.y * fill;

        this.x = this.ox;
        this.y = this.oy;

        this.size = Math.random() * 1.6 + 0.5;
        this.alpha = Math.random() * 0.6 + 0.3;
        this.phase = Math.random() * 6.28;

        const r = 240 + Math.random() * 15;
        const g = 40 + Math.random() * 60;
        const b = 120 + Math.random() * 100;

        this.color = `rgb(${r},${g},${b})`;
    }

    update(pulse, time) {
        this.x = this.ox * pulse + Math.sin(time + this.phase) * 0.4;
        this.y = this.oy * pulse + Math.cos(time + this.phase) * 0.4;

        this.alpha =
            0.55 +
            Math.sin(time * 2 + this.phase) * 0.35;
    }

    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Ember {
    constructor() {
        const t = Math.random() * Math.PI * 2;
        const p = heart(t, 18);

        this.x = p.x;
        this.y = p.y;

        const a = Math.atan2(p.y, p.x);
        const speed = 1 + Math.random() * 2;

        this.vx = Math.cos(a) * speed;
        this.vy = Math.sin(a) * speed;

        this.life = 1;
        this.size = Math.random() * 1.5 + 0.5;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;

        this.vy += 0.02;
        this.life -= 0.02;
    }

    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = "#ff7aa8";

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

let particles = [];
let embers = [];

function createParticles() {
    particles.length = 0;

    for (let i = 0; i < settings.density; i++) {
        particles.push(new Particle());
    }
}

createParticles();

let lastBeat = false;

function animate(now) {
    const time = now * 0.002;

    ctx.fillStyle = "rgba(5,5,5,0.12)";
    ctx.fillRect(0, 0, innerWidth, innerHeight);

    const cx = innerWidth / 2;
    const cy = innerHeight / 2;

    ctx.save();
    ctx.translate(cx, cy);

    const angle =
        (2 * Math.PI * now) /
        (settings.beatDuration * 1000);

    const pulse =
        (Math.sin(angle - Math.PI / 2) + 1) * 0.5;

    const eased =
        pulse * pulse * (3 - 2 * pulse);

    const pulseFactor =
        1 + eased * 0.18;

    if (pulse > 0.95 && !lastBeat) {
        for (let i = 0; i < 4; i++) {
            embers.push(new Ember());
        }

        lastBeat = true;
    }

    if (pulse < 0.7) {
        lastBeat = false;
    }

    ctx.shadowColor = "#ff4da6";
    ctx.shadowBlur = Math.min(
        20,
        settings.glow * 8
    );

    for (let i = 0; i < particles.length; i++) {
        particles[i].update(
            pulseFactor,
            time
        );

        particles[i].draw();
    }

    ctx.shadowBlur = 0;

    for (let i = embers.length - 1; i >= 0; i--) {
        embers[i].update();
        embers[i].draw();

        if (embers[i].life <= 0) {
            embers.splice(i, 1);
        }
    }

    ctx.restore();

    ctx.globalAlpha = 1;

    /* ==========================
   I LOVE U ❤️
========================== */

ctx.save();

const textPulse = 0.9 + eased * 0.25;

ctx.translate(
    innerWidth / 2,
    innerHeight / 2 + 180
);

ctx.scale(textPulse, textPulse);

ctx.textAlign = "center";
ctx.textBaseline = "middle";

const fontSize = Math.max(
    40,
    Math.min(innerWidth * 0.05, 70)
);

ctx.font = `bold ${fontSize}px "Segoe UI", Arial, sans-serif`;

const gradient = ctx.createLinearGradient(
    -250,
    0,
    250,
    0
);

gradient.addColorStop(0, "#ff4da6");
gradient.addColorStop(0.25, "#ff8ac8");
gradient.addColorStop(0.5, "#ffffff");
gradient.addColorStop(0.75, "#ff8ac8");
gradient.addColorStop(1, "#ff4da6");

ctx.fillStyle = gradient;

ctx.shadowColor = "#ff4da6";
ctx.shadowBlur = 20 + eased * 30;

ctx.fillText("I Love U", 0, 0);

ctx.globalAlpha = 0.4;
ctx.fillText("I Love U", 0, 0);

ctx.globalAlpha = 0.85;
ctx.shadowBlur = 10;
ctx.fillStyle = "#ffd6e8";

ctx.font = `${fontSize * 0.35}px "Segoe UI", sans-serif`;

ctx.fillText(
    "Forever & Always",
    0,
    fontSize * 0.9
);

ctx.restore();

requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

</body>
</html>
